version: "1.0.0"
name: "email-triage-env"
description: "An OpenEnv environment for an Autonomous Inbox Manager to triage emails (spam, invoices, meetings)."
author: "OpenEnv Developer"
api:
  url: "http://localhost:7860"
resources:
  cpu: 2
  memory: "8gb"
tasks:
  - id: "easy"
    description: "Detect obvious spam and delete it, routing it to the spam folder."
  - id: "medium"
    description: "Identify an invoice email and route it securely to the invoices folder."
  - id: "hard"
    description: "Identify an urgent meeting request, parse the calendar slots, book a valid time, and route to priority."
