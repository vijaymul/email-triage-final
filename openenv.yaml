name: "email-triage-openenv"
version: "0.1.0"
description: "AI Agent environment for email triage and inbox management."
author: "OpenEnv Team"
entry_point: "server.app:app"
sdk: "docker"
port: 7860
tasks:
  - id: "easy"
    difficulty: "easy"
    objective: "Identify and delete spam emails."
  - id: "medium"
    difficulty: "medium"
    objective: "Sort invoices and meeting requests into appropriate folders."
  - id: "hard"
    difficulty: "hard"
    objective: "Find a scheduling request and book an available calendar slot."
